<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>algolens</title>
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header class="page-header">
        <h1>
          algolens
          <span class="signature" title="dedeepya avancha">[da]</span>
        </h1>
        <nav class="header-actions" aria-label="Page actions">
          <span id="auth-widget" class="auth-widget">
            <span data-anon>
              <a href="/login.html" class="auth-link">log in</a>
              <span class="auth-sep">·</span>
              <a href="/signup.html" class="auth-link">sign up</a>
            </span>
            <span class="auth-user" data-signed hidden>
              <span class="auth-email" id="auth-email"></span>
              <button type="button" id="logout-btn" class="auth-logout">
                log out
              </button>
            </span>
          </span>
          <button type="button" class="theme-toggle" data-theme-toggle>
            light mode
          </button>
          <a href="/debug.html" class="debug-link">debug</a>
        </nav>
      </header>
      <p class="tagline">search dsa problems by keyword. ranked with bm25.</p>
      <form id="search-form" autocomplete="off">
        <input
          id="search-input"
          type="search"
          placeholder="graph cycle / monotonic / knapsack"
        />
        <span id="filter-wrap" class="filter-wrap" hidden>
          <select
            id="filter-select"
            class="filter-select"
            aria-label="filter results by done state"
          >
            <option value="all">all</option>
            <option value="notdone">not done</option>
            <option value="done">done</option>
          </select>
        </span>
        <button type="submit">search</button>
      </form>
      <div id="lib-bar" class="lib-bar" hidden>
        <span class="lib-prompt"
          ><span class="lib-host">algolens</span
          ><span class="lib-path" id="lib-path">~</span
          ><span class="lib-cursor">$</span></span
        >
        <span class="lib-chips">
          <button type="button" class="lib-chip" data-cmd=":bookmarks">
            ★ <span id="lib-count-bookmarks">0</span> bookmarks
          </button>
          <button type="button" class="lib-chip" data-cmd=":done">
            ✓ <span id="lib-count-done">0</span> done
          </button>
          <button type="button" class="lib-chip" data-cmd=":all">
            : ls all
          </button>
          <button type="button" class="lib-chip lib-chip-back" data-cmd="">
            ↺ search
          </button>
        </span>
      </div>
      <!-- COMPARE_MODE_DISABLED start: re-enable by uncommenting this block,
           the renderCompare branch in app.js, and the /api/compare route in
           server/routes/search.js. Note: rank-delta labels showed the OTHER
           ranker's name inside each card, which read as "this card is bm25"
           even when in the tf-idf column. Fix that wording before turning
           compare mode back on.
      <div class="mode-row">
        <label class="mode-toggle">
          <input id="compare-toggle" type="checkbox" checked />
          <span>compare rankers (a/b)</span>
        </label>
        <span id="latency-summary" class="latency-summary"></span>
      </div>
      -->
      <p id="status" class="status">
        type a query to search<span class="cursor">_</span>
      </p>
      <ul id="results" class="single-mode"></ul>
      <button id="load-more" class="load-more hidden" type="button">
        load more
      </button>
      <!-- COMPARE_MODE_DISABLED: <div id="compare-results" class="compare-grid hidden"></div> -->
    </main>
    <footer>
      algolens v0.2 · built by deepya · rankers: tf-idf + bm25 · corpus: 1185
      problems (leetcode + cses)
    </footer>
    <script src="/app.js"></script>
  </body>
</html>
