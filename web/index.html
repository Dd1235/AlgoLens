<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AlgoLens</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>AlgoLens</h1>
      <p class="tagline">Search DSA problems by keyword. Ranked with TF-IDF.</p>
      <form id="search-form" autocomplete="off">
        <input id="search-input" type="search" placeholder="e.g. graph cycle, monotonic, knapsack" />
        <button type="submit">Search</button>
      </form>
      <p id="status" class="status">Type a query to search.</p>
      <ul id="results"></ul>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
