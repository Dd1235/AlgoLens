<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>algolens</title>
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header class="page-header">
        <h1>
          algolens
          <span class="signature" title="dedeepya avancha">[da]</span>
        </h1>
        <nav class="header-actions" aria-label="Page actions">
          <button type="button" class="theme-toggle" data-theme-toggle>light mode</button>
          <a href="/debug.html" class="debug-link">debug</a>
        </nav>
      </header>
      <p class="tagline">search dsa problems by keyword. tf-idf and bm25 side by side.</p>
      <form id="search-form" autocomplete="off">
        <input
          id="search-input"
          type="search"
          placeholder="graph cycle / monotonic / knapsack"
        />
        <button type="submit">search</button>
      </form>
      <div class="mode-row">
        <label class="mode-toggle">
          <input id="compare-toggle" type="checkbox" checked />
          <span>compare rankers (a/b)</span>
        </label>
        <span id="latency-summary" class="latency-summary"></span>
      </div>
      <p id="status" class="status">
        type a query to search<span class="cursor">_</span>
      </p>
      <ul id="results" class="single-mode"></ul>
      <div id="compare-results" class="compare-grid hidden"></div>
    </main>
    <footer>
      algolens v0.2 · built by deepya · rankers: tf-idf + bm25 · corpus: 1185 problems (leetcode + cses)
    </footer>
    <script src="/app.js"></script>
  </body>
</html>
