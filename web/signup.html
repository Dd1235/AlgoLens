<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>algolens · sign up</title>
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="auth-main">
      <header class="page-header">
        <h1>
          <a href="/">algolens</a>
          <span class="signature" title="dedeepya avancha">[da]</span>
        </h1>
        <nav class="header-actions" aria-label="Page actions">
          <button type="button" class="theme-toggle" data-theme-toggle>light mode</button>
        </nav>
      </header>

      <section class="auth-card">
        <h2 class="auth-heading">sign up</h2>
        <form id="auth-form" class="auth-form" autocomplete="on" data-mode="signup" data-endpoint="/api/auth/signup">
          <input type="email" name="email" placeholder="email" required autocomplete="email" />
          <input type="password" name="password" placeholder="password (min 8 chars)" required autocomplete="new-password" minlength="8" />
          <button type="submit">create account</button>
          <p class="auth-error" id="auth-error" hidden></p>
        </form>
        <p class="auth-foot">
          accounts unlock <strong>bookmark</strong> and <strong>mark as done</strong>. already have one? <a href="/login.html">log in</a> · <a href="/">back to search</a>
        </p>
      </section>
    </main>
    <script src="/auth.js"></script>
  </body>
</html>
