# Optional local Postgres for AlgoLens dev. The default dev path is Neon
# (hosted), so most of the time you don't need this. Use it when you want to
# work offline or don't want to depend on Neon's free tier.
#
#   npm run services:start        # boot pg in docker
#   DATABASE_URL=postgres://algolens:dev@localhost:5433/algolens npm run db:migrate
#   # then point .env at the same URL and run `npm run dev`
#
# Exposed on 5433 to avoid colliding with a system-installed Postgres on 5432.
# Data persists in the `algolens_pgdata` named volume across container restarts.
services:
  postgres:
    image: postgres:16-alpine
    container_name: algolens-postgres
    environment:
      POSTGRES_USER: algolens
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: algolens
    ports:
      - "5433:5432"
    volumes:
      - algolens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algolens -d algolens"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  algolens_pgdata:
