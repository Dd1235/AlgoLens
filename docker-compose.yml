# Local Postgres for AlgoLens dev.
#   docker compose up -d
#   DATABASE_URL=postgres://algolens:dev@localhost:5433/algolens npm run db:migrate
#
# Exposed on 5433 to avoid colliding with a system-installed Postgres on 5432.
# Production uses Render Managed Postgres (see render.yaml). The DATABASE_URL
# shape is the same so the app code is host-agnostic.
services:
  postgres:
    image: postgres:16-alpine
    container_name: algolens-postgres
    environment:
      POSTGRES_USER: algolens
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: algolens
    ports:
      - "5433:5432"
    volumes:
      - algolens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algolens -d algolens"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  algolens_pgdata:
